# =============================================================================
# ONYX APP - Docker Compose Standalone (AMD / Ollama en el host)
# =============================================================================
# Variante para hosts con GPU AMD (ROCm) y Ollama instalado en el sistema.
# No usa NVIDIA ni los contenedores onyx-model-server (PyTorch/CUDA).
#
# Inferencia y embeddings para RAG se configuran en Onyx Admin apuntando a Ollama:
#   http://host.docker.internal:11434
#
# Basado en onyx-app-standalone.yaml — upstream:
#   https://github.com/onyx-dot-app/onyx/tree/main/deployment/docker_compose
# =============================================================================
# PREREQUISITES:
# =============================================================================
# 1. OpenSearch: vm.max_map_count >= 262144
#      sudo sysctl -w vm.max_map_count=262144
#      echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
#
# 2. Ollama en el host (ROCm) escuchando en el puerto 11434:
#      ollama --version
#      curl -s http://127.0.0.1:11434/api/tags
#    Modelos recomendados (ajusta a tu VRAM):
#      ollama pull llama3.2          # chat (ejemplo)
#      ollama pull nomic-embed-text  # embeddings para RAG (ejemplo)
#
# 3. Crear directorios (sin cachés HuggingFace de model servers):
#      mkdir -p /home/notolac/onyx-app/{postgres-data,vespa-data,opensearch-data,minio-data,file-system,nginx-templates}
#      mkdir -p /home/notolac/onyx-app/logs/{api-server,background}
#      sudo chown -R $(id -u):$(id -g) /home/notolac/onyx-app
#
# 4. Nginx templates del repo oficial:
#      cd /home/notolac/onyx-app/nginx-templates
#      curl -LO https://raw.githubusercontent.com/onyx-dot-app/onyx/main/deployment/data/nginx/app.conf.template
#      curl -LO https://raw.githubusercontent.com/onyx-dot-app/onyx/main/deployment/data/nginx/run-nginx.sh
#      chmod +x run-nginx.sh
#
# 5. Tras el primer arranque, en Admin Panel:
#    - Configuration → Language Models → Ollama
#      API URL: http://host.docker.internal:11434
#    - Configuration → Search / Embeddings → proveedor Ollama (mismo host)
#    Docs: https://docs.onyx.app/admins/ai_models/ollama
#
# 6. Code interpreter: monta el socket Docker del host (riesgo de seguridad).
#    Ver README-onyx-swarm.md. Rootless: DOCKER_SOCK_PATH.
#
# =============================================================================
# VARIABLES (Portainer / .env):
# =============================================================================
# REQUERIDAS:
#   POSTGRES_USER, POSTGRES_PASSWORD
#
# OPCIONALES:
#   IMAGE_TAG, ONYX_PORT, AUTH_TYPE, POSTGRES_DB, ONYX_DATA_PATH,
#   OPENSEARCH_ADMIN_PASSWORD, WEB_DOMAIN, USER_AUTH_SECRET, SMTP_*, etc.
#
#   OLLAMA_BASE_URL — solo documentación; Onyx usa la URL configurada en Admin UI.
#                     Valor de referencia: http://host.docker.internal:11434
#
# =============================================================================
# DEPLOY:
# =============================================================================
#   docker compose -f onyx-app-standalone-amd.yaml up -d
# =============================================================================

version: '3.8'

services:
  api_server:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    container_name: onyx-api-server
    restart: always
    networks:
      - onyx
    depends_on:
      - relational_db
      - index
      - opensearch
      - cache
      - minio
      - code-interpreter
    command: >
      /bin/sh -c "alembic upgrade head &&
      echo 'Starting Onyx Api Server' &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080"
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-basic}
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-onyx_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - DISABLE_MODEL_SERVER=true
      - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
      - USER_AUTH_SECRET=${USER_AUTH_SECRET:-}
      - WEB_DOMAIN=${WEB_DOMAIN:-}
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - ENABLE_EMAIL_INVITES=${ENABLE_EMAIL_INVITES:-}
      - REQUIRE_EMAIL_VERIFICATION=${REQUIRE_EMAIL_VERIFICATION:-}
      - VALID_EMAIL_DOMAINS=${VALID_EMAIL_DOMAINS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/logs/api-server:/var/log/onyx
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/file-system:/app/file-system
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  background:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    container_name: onyx-background
    restart: always
    networks:
      - onyx
    depends_on:
      - relational_db
      - index
      - opensearch
      - cache
    command: >
      /bin/sh -c "
      if [ -f /app/scripts/setup_craft_templates.sh ]; then
        /app/scripts/setup_craft_templates.sh;
      fi &&
      if [ -f /etc/ssl/certs/custom-ca.crt ]; then
        update-ca-certificates;
      fi &&
      /app/scripts/supervisord_entrypoint.sh"
    environment:
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-onyx_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - DISABLE_MODEL_SERVER=true
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - API_SERVER_PROTOCOL=${API_SERVER_PROTOCOL:-http}
      - API_SERVER_HOST=${API_SERVER_HOST:-api_server}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
      - USER_AUTH_SECRET=${USER_AUTH_SECRET:-}
      - WEB_DOMAIN=${WEB_DOMAIN:-}
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - ENABLE_EMAIL_INVITES=${ENABLE_EMAIL_INVITES:-}
      - REQUIRE_EMAIL_VERIFICATION=${REQUIRE_EMAIL_VERIFICATION:-}
      - VALID_EMAIL_DOMAINS=${VALID_EMAIL_DOMAINS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/logs/background:/var/log/onyx
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/file-system:/app/file-system
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  web_server:
    image: onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}
    container_name: onyx-web-server
    restart: always
    networks:
      - onyx
    depends_on:
      - api_server
    environment:
      - INTERNAL_URL=${INTERNAL_URL:-http://api_server:8080}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  relational_db:
    image: postgres:15.2-alpine
    container_name: onyx-relational-db
    restart: always
    networks:
      - onyx
    shm_size: 1g
    command: -c 'max_connections=250'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-onyx_db}
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  index:
    image: vespaengine/vespa:8.609.39
    container_name: onyx-index
    restart: always
    networks:
      - onyx
    environment:
      - VESPA_SKIP_UPGRADE_CHECK=${VESPA_SKIP_UPGRADE_CHECK:-true}
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/vespa-data:/opt/vespa/var
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    container_name: onyx-opensearch
    restart: always
    networks:
      - onyx
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/opensearch-data:/usr/share/opensearch/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  nginx:
    image: nginx:1.25.5-alpine
    container_name: onyx-nginx
    restart: always
    networks:
      - onyx
    depends_on:
      - api_server
      - web_server
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
      - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
      - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    ports:
      - "${ONYX_PORT:-3080}:80"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/nginx-templates:/nginx-templates:ro
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && cp -a /nginx-templates/. /etc/nginx/conf.d/
      && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh
      && /tmp/run-nginx.sh app.conf.template"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  cache:
    image: redis:7.4-alpine
    container_name: onyx-cache
    restart: always
    networks:
      - onyx
    command: redis-server --save "" --appendonly no
    tmpfs:
      - /data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    container_name: onyx-minio
    restart: always
    networks:
      - onyx
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${S3_FILE_STORE_BUCKET_NAME:-onyx-file-store-bucket}
    command: server /data --console-address ":9001"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  code-interpreter:
    image: onyxdotapp/code-interpreter:${CODE_INTERPRETER_IMAGE_TAG:-latest}
    container_name: onyx-code-interpreter
    restart: always
    networks:
      - onyx
    command: ["bash", "./entrypoint.sh", "code-interpreter-api"]
    user: root
    volumes:
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

networks:
  onyx:
    driver: bridge

# =============================================================================
# EJEMPLO .env (AMD + Ollama en host)
# =============================================================================
# POSTGRES_USER=onyx
# POSTGRES_PASSWORD=your_secure_password
# ONYX_PORT=3080
# AUTH_TYPE=basic
# POSTGRES_DB=onyx_db
# ONYX_DATA_PATH=/home/notolac/onyx-app
# WEB_DOMAIN=http://tu-servidor:3080
# USER_AUTH_SECRET=<openssl rand -hex 32>
#
# Ollama (configurar la misma URL en Admin UI):
# OLLAMA_BASE_URL=http://host.docker.internal:11434
#
# docker compose -f onyx-app-standalone-amd.yaml up -d
#
# Comprobar que los contenedores alcanzan Ollama:
# docker exec onyx-api-server python -c "import urllib.request; print(urllib.request.urlopen('http://host.docker.internal:11434/api/tags').read()[:200])"
# =============================================================================
