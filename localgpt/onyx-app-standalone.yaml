# =============================================================================
# ONYX APP - Docker Compose Standalone
# =============================================================================
# Adapted from the official Onyx docker-compose.yml for standalone / Portainer.
# Original: https://github.com/onyx-dot-app/onyx
#
# This compose file sets up the full Onyx platform:
#   - api_server:              Backend API + DB migrations (internal)
#   - background:              Background workers (internal)
#   - web_server:              Next.js frontend (internal)
#   - inference_model_server:  ML model server for inference (internal)
#   - indexing_model_server:   ML model server for indexing (internal)
#   - relational_db:           PostgreSQL 15 (internal)
#   - index:                   Vespa search engine (internal)
#   - opensearch:              OpenSearch full-text search (internal)
#   - nginx:                   Reverse proxy - ENTRY POINT (Port 3080)
#   - cache:                   Redis ephemeral (internal)
#   - minio:                   S3-compatible object storage (internal)
#   - code-interpreter:        Code execution (internal; mounts Docker socket — see README)
#
# =============================================================================
# PREREQUISITES:
# =============================================================================
# 1. OpenSearch requires vm.max_map_count >= 262144:
#      sudo sysctl -w vm.max_map_count=262144
#      echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
#
# 2. Create data directories:
#      mkdir -p /home/notolac/onyx-app/{postgres-data,vespa-data,opensearch-data,minio-data,file-system,nginx-templates,model-cache-hf,indexing-model-cache-hf}
#      mkdir -p /home/notolac/onyx-app/logs/{api-server,background,inference-model-server,indexing-model-server}
#      sudo chown -R $(id -u):$(id -g) /home/notolac/onyx-app
#
# 3. Download Onyx nginx config files:
#      cd /home/notolac/onyx-app/nginx-templates
#      curl -LO https://raw.githubusercontent.com/onyx-dot-app/onyx/main/deployment/data/nginx/app.conf.template
#      curl -LO https://raw.githubusercontent.com/onyx-dot-app/onyx/main/deployment/data/nginx/run-nginx.sh
#      chmod +x run-nginx.sh
#
# 4. GPU (NVIDIA): model servers use deploy.resources.devices below. Requires on the host:
#      - Proprietary NVIDIA driver + nvidia-smi working
#      - nvidia-container-toolkit (docker run --rm --gpus all nvidia/cuda:12.0.0-base-ubuntu22.04 nvidia-smi)
#    Both inference and indexing share the same GPU(s). To force CPU-only, remove the deploy: blocks from
#    inference_model_server and indexing_model_server (see upstream onyx docker-compose for reference).
#
# 5. Code interpreter: service `code-interpreter` mounts the Docker socket of the host
#    (${DOCKER_SOCK_PATH:-/var/run/docker.sock}) so executed code can run in sibling containers. This has
#    serious security implications — see README-onyx-swarm.md. Rootless Docker: set DOCKER_SOCK_PATH accordingly.
#
# ===========================================
# REQUIRED ENVIRONMENT VARIABLES:
# ===========================================
# DO NOT use quotes around variable values in Portainer!
#
# - POSTGRES_USER:     PostgreSQL username     (e.g. onyx)
# - POSTGRES_PASSWORD: PostgreSQL password     (REQUIRED - generate a secure one)
#
# ===========================================
# OPTIONAL ENVIRONMENT VARIABLES (with defaults):
# ===========================================
# - IMAGE_TAG:                 Onyx image tag (default: latest)
# - ONYX_PORT:                 External port for Onyx UI (default: 3080)
# - AUTH_TYPE:                 Authentication type (default: basic)
# - POSTGRES_DB:               Database name (default: onyx_db)
# - OPENSEARCH_ADMIN_PASSWORD: OpenSearch password (default: StrongPassword123!)
# - ONYX_DATA_PATH:            Base path for data (default: /home/notolac/onyx-app)
#
# See README-onyx-swarm.md for the complete variable reference.
#
# ===========================================
# DEPLOYMENT:
# ===========================================
# CLI:       docker compose -f onyx-app-standalone.yaml up -d
# Portainer: Stacks > Add stack > Upload this file > Add env vars > Deploy
#
# ===========================================
# TROUBLESHOOTING:
# ===========================================
# - Check status:  docker compose -f onyx-app-standalone.yaml ps
# - View all logs: docker compose -f onyx-app-standalone.yaml logs -f
# - View one log:  docker logs onyx-api-server -f
# - Restart:       docker compose -f onyx-app-standalone.yaml restart <service>
# ===========================================

version: '3.8'

services:
  api_server:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    container_name: onyx-api-server
    restart: always
    networks:
      - onyx
    depends_on:
      - relational_db
      - index
      - opensearch
      - cache
      - inference_model_server
      - minio
      - code-interpreter
    command: >
      /bin/sh -c "alembic upgrade head &&
      echo 'Starting Onyx Api Server' &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080"
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-basic}
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-onyx_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
      - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/logs/api-server:/var/log/onyx
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/file-system:/app/file-system
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  background:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    container_name: onyx-background
    restart: always
    networks:
      - onyx
    depends_on:
      - relational_db
      - index
      - opensearch
      - cache
      - inference_model_server
      - indexing_model_server
    command: >
      /bin/sh -c "
      if [ -f /app/scripts/setup_craft_templates.sh ]; then
        /app/scripts/setup_craft_templates.sh;
      fi &&
      if [ -f /etc/ssl/certs/custom-ca.crt ]; then
        update-ca-certificates;
      fi &&
      /app/scripts/supervisord_entrypoint.sh"
    environment:
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-onyx_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
      - INDEXING_MODEL_SERVER_HOST=${INDEXING_MODEL_SERVER_HOST:-indexing_model_server}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - API_SERVER_PROTOCOL=${API_SERVER_PROTOCOL:-http}
      - API_SERVER_HOST=${API_SERVER_HOST:-api_server}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/logs/background:/var/log/onyx
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/file-system:/app/file-system
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  web_server:
    image: onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}
    container_name: onyx-web-server
    restart: always
    networks:
      - onyx
    depends_on:
      - api_server
    environment:
      - INTERNAL_URL=${INTERNAL_URL:-http://api_server:8080}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  inference_model_server:
    image: onyxdotapp/onyx-model-server:${IMAGE_TAG:-latest}
    container_name: onyx-inference-model-server
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - onyx
    command: >
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/model-cache-hf:/app/.cache/huggingface/
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/logs/inference-model-server:/var/log/onyx
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  indexing_model_server:
    image: onyxdotapp/onyx-model-server:${IMAGE_TAG:-latest}
    container_name: onyx-indexing-model-server
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - onyx
    command: >
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    environment:
      - INDEXING_ONLY=True
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/indexing-model-cache-hf:/app/.cache/huggingface/
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/logs/indexing-model-server:/var/log/onyx
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  relational_db:
    image: postgres:15.2-alpine
    container_name: onyx-relational-db
    restart: always
    networks:
      - onyx
    shm_size: 1g
    command: -c 'max_connections=250'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-onyx_db}
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  index:
    image: vespaengine/vespa:8.609.39
    container_name: onyx-index
    restart: always
    networks:
      - onyx
    environment:
      - VESPA_SKIP_UPGRADE_CHECK=${VESPA_SKIP_UPGRADE_CHECK:-true}
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/vespa-data:/opt/vespa/var
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    container_name: onyx-opensearch
    restart: always
    networks:
      - onyx
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/opensearch-data:/usr/share/opensearch/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  nginx:
    image: nginx:1.25.5-alpine
    container_name: onyx-nginx
    restart: always
    networks:
      - onyx
    depends_on:
      - api_server
      - web_server
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
      - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
      - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    ports:
      - "${ONYX_PORT:-3080}:80"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/nginx-templates:/nginx-templates:ro
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && cp -a /nginx-templates/. /etc/nginx/conf.d/
      && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh
      && /tmp/run-nginx.sh app.conf.template"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  cache:
    image: redis:7.4-alpine
    container_name: onyx-cache
    restart: always
    networks:
      - onyx
    command: redis-server --save "" --appendonly no
    tmpfs:
      - /data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    container_name: onyx-minio
    restart: always
    networks:
      - onyx
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${S3_FILE_STORE_BUCKET_NAME:-onyx-file-store-bucket}
    command: server /data --console-address ":9001"
    volumes:
      - ${ONYX_DATA_PATH:-/home/notolac/onyx-app}/minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  code-interpreter:
    image: onyxdotapp/code-interpreter:${CODE_INTERPRETER_IMAGE_TAG:-latest}
    container_name: onyx-code-interpreter
    restart: always
    networks:
      - onyx
    command: ["bash", "./entrypoint.sh", "code-interpreter-api"]
    user: root
    volumes:
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

networks:
  onyx:
    driver: bridge

# ===========================================
# EXAMPLE PORTAINER ENVIRONMENT VARIABLES
# ===========================================
# DO NOT USE QUOTES around the values in Portainer!
#
# REQUIRED:
# ---------
# POSTGRES_USER=onyx
# POSTGRES_PASSWORD=your_secure_password_here
#
# OPTIONAL (uncomment/add if needed):
# ------------------------------------
# IMAGE_TAG=latest
# ONYX_PORT=3080
# AUTH_TYPE=basic
# POSTGRES_DB=onyx_db
# OPENSEARCH_ADMIN_PASSWORD=StrongPassword123!
# ONYX_DATA_PATH=/home/notolac/onyx-app
# MINIO_ROOT_USER=minioadmin
# MINIO_ROOT_PASSWORD=minioadmin
# CODE_INTERPRETER_BASE_URL=http://code-interpreter:8000
# CODE_INTERPRETER_IMAGE_TAG=latest
# DOCKER_SOCK_PATH=/var/run/docker.sock
#
# ===========================================
# EXAMPLE .env FILE
# ===========================================
# If deploying via docker compose CLI, create a .env file with:
#
# POSTGRES_USER=onyx
# POSTGRES_PASSWORD=your_secure_password
# ONYX_PORT=3080
# AUTH_TYPE=basic
# POSTGRES_DB=onyx_db
# IMAGE_TAG=latest
# ONYX_DATA_PATH=/home/notolac/onyx-app
#
# Place this .env file in the same directory as onyx-app-standalone.yaml
# Then deploy with: docker compose -f onyx-app-standalone.yaml up -d
# ===========================================
