# Prometheus + Grafana + exporters — solo LAN.
# Requiere en el host: ${PROMETHEUS_CONFIG_DIR}/prometheus.yml (ver ../prometheus/prometheus.yml.example)
# Datos: ${PROMETHEUS_DATA_DIR}, ${GRAFANA_DATA_DIR} (crear con dueño adecuado antes del primer up)
---
services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-v3.2.1}
    container_name: prometheus
    restart: unless-stopped
    ports:
      - ${PROMETHEUS_HOST_PORT:-9090}:9090
    volumes:
      # Opción A: fichero del repo Git (Portainer pull → restart prometheus)
      - ${PROMETHEUS_CONFIG_FILE:-/etc/prometheus/prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA_DIR:-/home/notolac/node-monitor-grafana/prometheus-data}:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-90d}
    networks:
      - monitoring

  grafana:
    image: grafana/grafana-oss:${GRAFANA_IMAGE_TAG:-11.5.2}
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - ${GRAFANA_HOST_PORT:-3030}:3000
    environment:
      TZ: ${TZ:-Europe/Madrid}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://10.0.1.11:3030}
      GF_INSTALL_PLUGINS: ${GF_INSTALL_PLUGINS:-}
    volumes:
      - ${GRAFANA_DATA_DIR:-/home/notolac/node-monitor-grafana/grafana-data}:/var/lib/grafana
      # Portainer Git resolves relative bind paths from the repository root.
      - ${GRAFANA_DATASOURCES_FILE:-./configs/srv-media-docker/grafana/provisioning/datasources/loki.yaml}:/etc/grafana/provisioning/datasources/loki.yaml:ro
    networks:
      - monitoring

  loki:
    image: grafana/loki:${LOKI_IMAGE_TAG:-3.7.1}
    container_name: loki
    restart: unless-stopped
    ports:
      - ${LOKI_HOST_PORT:-3100}:3100
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      # Portainer Git resolves relative bind paths from the repository root.
      - ${LOKI_CONFIG_FILE:-./configs/srv-media-docker/loki/loki-config.yaml}:/etc/loki/local-config.yaml:ro
      - ${LOKI_DATA_DIR:-/home/notolac/node-monitor-grafana/loki-data}:/loki
    networks:
      - monitoring

  node_exporter:
    image: quay.io/prometheus/node-exporter:${NODE_EXPORTER_IMAGE_TAG:-v1.9.0}
    container_name: node_exporter
    hostname: srv-media-docker
    restart: unless-stopped
    pid: host
    ports:
      - ${NODE_EXPORTER_HOST_PORT:-9100}:9100
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run)($$|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    # >= v0.54: Docker 29 + containerd-snapshotter (overlayfs); v0.51 falla layerdb/mount-id
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_IMAGE_TAG:-v0.55.1}
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    cgroup: host
    ports:
      - ${CADVISOR_HOST_PORT:-8084}:8080
    command:
      - --docker_only=true
      - --store_container_labels=true
      - --housekeeping_interval=30s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
