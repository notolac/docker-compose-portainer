global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: homelab
    site: srv-media-docker

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          host: srv-media-docker
          
  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          host: srv-media-docker
          role: media

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          host: srv-media-docker
          role: media
